<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>課程報告計時器</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #5f6f7d;
      --line: #d8e0e6;
      --panel: #ffffff;
      --paper: #f4f7f8;
      --accent: #0f7b6c;
      --accent-dark: #095f54;
      --warn: #b86416;
      --done: #b72534;
      --shadow: 0 18px 48px rgba(23, 32, 42, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(120deg, rgba(15, 123, 108, 0.12), transparent 36%),
        linear-gradient(240deg, rgba(184, 100, 22, 0.12), transparent 32%),
        var(--paper);
      color: var(--ink);
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, input, select { font: inherit; }

    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 420px;
      gap: 20px;
      min-height: 100vh;
      padding: 22px;
    }

    .stage, .side {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .stage {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-width: 0;
    }

    .topbar, .actions, .settings { padding: 20px; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--line);
    }

    .group { min-width: 0; }

    .group-label {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      overflow-wrap: anywhere;
      font-size: clamp(1.8rem, 3vw, 3rem);
      line-height: 1.05;
    }

    .phase-pill {
      flex: 0 0 auto;
      min-width: 128px;
      padding: 12px 16px;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      text-align: center;
      font-size: 1.3rem;
      font-weight: 800;
    }

    .timer-wrap {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .timer {
      width: min(100%, 920px);
      text-align: center;
    }

    .time {
      font-variant-numeric: tabular-nums;
      font-size: clamp(6rem, 18vw, 15rem);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: 0;
    }

    .time.warning { color: var(--warn); }
    .time.overtime { color: var(--done); }

    .status {
      margin-top: 24px;
      color: var(--muted);
      font-size: clamp(1.15rem, 2.3vw, 1.9rem);
      font-weight: 800;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 20px;
    }

    .metric {
      min-height: 72px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
      font-size: 1.35rem;
    }

    .progress-shell {
      height: 18px;
      margin-top: 24px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #e8eef1;
    }

    .progress {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), #6aa6a0);
      transition: width 0.2s linear, background 0.2s;
    }

    .progress.warning { background: linear-gradient(90deg, var(--warn), #d3a055); }
    .progress.overtime { background: linear-gradient(90deg, var(--done), #d56b76); }

    .actions {
      display: grid;
      grid-template-columns: 1.3fr 1fr 1fr 1fr;
      gap: 12px;
      border-top: 1px solid var(--line);
    }

    .side {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--panel);
    }

    .settings {
      display: grid;
      gap: 20px;
      overflow: auto;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #f4f7f8;
    }

    .tab-button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      cursor: pointer;
      font-weight: 900;
    }

    .tab-button.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .tab-panel {
      display: none;
      gap: 20px;
    }

    .tab-panel.active {
      display: grid;
    }

    .section {
      display: grid;
      gap: 12px;
    }

    .section-title {
      margin: 0;
      font-size: 1.05rem;
    }

    .field-grid, .preset-grid, .schedule-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      color: var(--ink);
      font-size: 1.05rem;
      font-weight: 800;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 48px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      font-weight: 800;
    }

    .toggle-row input {
      width: 22px;
      min-height: 22px;
      accent-color: var(--accent);
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .button {
      min-height: 54px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 10px 14px;
      background: #e8eef1;
      color: var(--ink);
      cursor: pointer;
      font-weight: 900;
      transition: transform 0.08s, background 0.18s, border-color 0.18s;
    }

    .button:hover { transform: translateY(-1px); }
    .button:active { transform: translateY(0); }
    .button.primary { background: var(--accent); color: #fff; }
    .button.primary:hover { background: var(--accent-dark); }
    .button.danger {
      background: #f4e4e6;
      color: var(--done);
      border-color: #e8c4c8;
    }
    .button.small {
      min-height: 42px;
      padding: 8px 12px;
      font-size: 0.92rem;
    }

    .sound-state, .summary {
      display: grid;
      gap: 8px;
      padding: 12px;
      border-radius: 8px;
      background: #f4f7f8;
    }

    .sound-state strong { color: var(--accent-dark); }

    .summary {
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .summary div {
      padding: 10px;
      border-radius: 8px;
      background: #fff;
    }

    .summary span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .summary strong {
      display: block;
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
      font-size: 1.1rem;
    }

    .schedule-list {
      display: grid;
      gap: 8px;
    }

    .schedule-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto auto auto;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .schedule-item.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(15, 123, 108, 0.14);
    }

    .schedule-number {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: #e8eef1;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 900;
    }

    .schedule-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 900;
    }

    .icon-button {
      width: 34px;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f4f7f8;
      color: var(--ink);
      cursor: pointer;
      font-weight: 900;
    }

    .icon-button.danger {
      color: var(--done);
      background: #f4e4e6;
      border-color: #e8c4c8;
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-size: 0.9rem;
    }

    .history-table th,
    .history-table td {
      padding: 9px 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
    }

    .history-table th {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .history-table tr:last-child td { border-bottom: 0; }
    .history-table .over { color: var(--done); font-weight: 900; }
    .history-table .empty {
      color: var(--muted);
      text-align: center;
      white-space: normal;
    }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .actions { grid-template-columns: 1fr 1fr; }
      .side { min-height: auto; }
    }

    @media (max-width: 560px) {
      .app { padding: 12px; }
      .topbar { align-items: stretch; flex-direction: column; }
      .phase-pill { width: 100%; }
      .actions, .field-grid, .preset-grid, .metrics, .summary, .schedule-form { grid-template-columns: 1fr; }
      .tabs { grid-template-columns: 1fr; }
      .schedule-item { grid-template-columns: auto minmax(0, 1fr) auto auto; }
      .schedule-item .set-current { grid-column: 2 / -1; width: 100%; }
      .time { font-size: clamp(4.4rem, 22vw, 8rem); }
      .history-table { font-size: 0.82rem; }
      .history-table th, .history-table td { padding: 8px 5px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="stage" aria-live="polite">
      <div class="topbar">
        <div class="group">
          <p class="group-label">目前組別</p>
          <h1 id="groupTitle">第 1 組</h1>
        </div>
        <div class="phase-pill" id="phasePill">報告</div>
      </div>

      <div class="timer-wrap">
        <div class="timer">
          <div class="time" id="timeDisplay">06:00</div>
          <div class="status" id="statusText">準備開始報告</div>
          <div class="metrics">
            <div class="metric">
              <span>原定時間</span>
              <strong id="plannedMetric">06:00</strong>
            </div>
            <div class="metric">
              <span>實際已用</span>
              <strong id="elapsedMetric">00:00</strong>
            </div>
            <div class="metric">
              <span>超時</span>
              <strong id="overtimeMetric">00:00</strong>
            </div>
          </div>
          <div class="progress-shell" aria-hidden="true">
            <div class="progress" id="progressBar"></div>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="button primary" id="startPauseBtn" type="button">開始</button>
        <button class="button" id="resetBtn" type="button">重設本段</button>
        <button class="button" id="skipBtn" type="button">切到 QA</button>
        <button class="button danger" id="nextGroupBtn" type="button">下一組</button>
      </div>
    </section>

    <aside class="side">
      <nav class="tabs" aria-label="後臺功能">
        <button class="tab-button active" type="button" data-tab="settings">設定</button>
        <button class="tab-button" type="button" data-tab="schedule">組別順序</button>
        <button class="tab-button" type="button" data-tab="history">歷史紀錄</button>
      </nav>
      <div class="settings">
        <div class="tab-panel active" id="settingsPanel">
          <section class="section">
            <h2 class="section-title">時間設定</h2>
            <div class="field-grid">
              <label>
                報告分鐘
                <input id="reportMinutes" type="number" min="0" max="99" step="1" value="6">
              </label>
              <label>
                報告秒數
                <input id="reportSeconds" type="number" min="0" max="59" step="1" value="0">
              </label>
              <label>
                QA 分鐘
                <input id="qaMinutes" type="number" min="0" max="99" step="1" value="7">
              </label>
              <label>
                QA 秒數
                <input id="qaSeconds" type="number" min="0" max="59" step="1" value="0">
              </label>
            </div>
            <div class="preset-grid">
              <button class="button small" id="presetDefaultBtn" type="button">6 + 7 分鐘</button>
              <button class="button small" id="presetShortBtn" type="button">測試 40 + 40 秒</button>
            </div>
          </section>

          <section class="section">
            <h2 class="section-title">提醒設定</h2>
            <div class="field-grid">
              <label>
                剩餘分鐘
                <input id="warningMinutes" type="number" min="0" max="99" step="1" value="0">
              </label>
              <label>
                剩餘秒數
                <input id="warningSeconds" type="number" min="0" max="59" step="1" value="30">
              </label>
            </div>
            <label class="toggle-row">
              <span>報告時間到自動進入 QA</span>
              <input id="autoAdvance" type="checkbox">
            </label>
          </section>

          <section class="section">
            <h2 class="section-title">鈴聲</h2>
            <div class="sound-state">
              <p class="hint"><strong id="soundStatus">尚未啟用聲音</strong></p>
              <p class="hint">請先按「啟用/測試鈴聲」，並把電腦與喇叭音量調高。瀏覽器通常需要一次點擊後才允許播放提示音。</p>
            </div>
          <button class="button primary" id="soundBtn" type="button">啟用/測試鈴聲</button>
          <label>
            鈴聲樣式
            <select id="soundTheme">
              <option value="chime">清亮鐘聲</option>
              <option value="marimba">柔和木琴</option>
              <option value="bell">教室大鈴</option>
            </select>
          </label>
          <label>
            鈴聲音量
            <input id="volume" type="range" min="0" max="100" value="100">
          </label>
          </section>
        </div>

        <div class="tab-panel" id="schedulePanel">
          <section class="section">
            <h2 class="section-title">組別順序</h2>
            <p class="hint">按「設為目前」可直接跳到該組；按「下一組」會照這份順序前進。</p>
            <div class="schedule-form">
              <label>
                組別名稱
                <input id="groupNameInput" type="text" placeholder="例如：第 1 組、A 組、專題名稱">
              </label>
              <button class="button primary" id="addGroupBtn" type="button">新增組別</button>
            </div>
            <div class="preset-grid">
              <button class="button small" id="addDefaultGroupsBtn" type="button">建立 8 組</button>
              <button class="button small danger" id="clearScheduleBtn" type="button">清空順序</button>
            </div>
            <div class="schedule-list" id="scheduleList"></div>
          </section>
        </div>

        <div class="tab-panel" id="historyPanel">
          <section class="section">
            <h2 class="section-title">後臺紀錄</h2>
            <div class="summary">
              <div>
                <span>已記錄段落</span>
                <strong id="recordCount">0</strong>
              </div>
              <div>
                <span>累計超時</span>
                <strong id="totalOvertime">00:00</strong>
              </div>
            </div>
            <table class="history-table">
              <thead>
                <tr>
                  <th>組別</th>
                  <th>階段</th>
                  <th>原定</th>
                  <th>實際</th>
                  <th>超時</th>
                </tr>
              </thead>
              <tbody id="historyBody">
                <tr><td class="empty" colspan="5">尚無紀錄</td></tr>
              </tbody>
            </table>
            <div class="preset-grid">
              <button class="button small" id="downloadCsvBtn" type="button">下載 CSV</button>
              <button class="button small danger" id="clearHistoryBtn" type="button">清除紀錄</button>
            </div>
          </section>
        </div>
      </div>
    </aside>
  </main>

  <script>
    const phaseNames = {
      report: "報告",
      qa: "QA"
    };

    const state = {
      group: 1,
      phase: "report",
      planned: 360,
      elapsed: 0,
      running: false,
      warned: false,
      doneRang: false,
      timerId: null,
      audioContext: null,
      soundReady: false,
      currentRecordId: null,
      startedAt: null,
      currentGroupIndex: 0,
      schedule: [],
      records: []
    };

    const els = {
      tabButtons: document.querySelectorAll(".tab-button"),
      tabPanels: document.querySelectorAll(".tab-panel"),
      groupTitle: document.querySelector("#groupTitle"),
      phasePill: document.querySelector("#phasePill"),
      timeDisplay: document.querySelector("#timeDisplay"),
      statusText: document.querySelector("#statusText"),
      plannedMetric: document.querySelector("#plannedMetric"),
      elapsedMetric: document.querySelector("#elapsedMetric"),
      overtimeMetric: document.querySelector("#overtimeMetric"),
      progressBar: document.querySelector("#progressBar"),
      startPauseBtn: document.querySelector("#startPauseBtn"),
      resetBtn: document.querySelector("#resetBtn"),
      skipBtn: document.querySelector("#skipBtn"),
      nextGroupBtn: document.querySelector("#nextGroupBtn"),
      reportMinutes: document.querySelector("#reportMinutes"),
      reportSeconds: document.querySelector("#reportSeconds"),
      qaMinutes: document.querySelector("#qaMinutes"),
      qaSeconds: document.querySelector("#qaSeconds"),
      warningMinutes: document.querySelector("#warningMinutes"),
      warningSeconds: document.querySelector("#warningSeconds"),
      autoAdvance: document.querySelector("#autoAdvance"),
      presetDefaultBtn: document.querySelector("#presetDefaultBtn"),
      presetShortBtn: document.querySelector("#presetShortBtn"),
      soundBtn: document.querySelector("#soundBtn"),
      soundStatus: document.querySelector("#soundStatus"),
      soundTheme: document.querySelector("#soundTheme"),
      volume: document.querySelector("#volume"),
      recordCount: document.querySelector("#recordCount"),
      totalOvertime: document.querySelector("#totalOvertime"),
      historyBody: document.querySelector("#historyBody"),
      downloadCsvBtn: document.querySelector("#downloadCsvBtn"),
      clearHistoryBtn: document.querySelector("#clearHistoryBtn"),
      groupNameInput: document.querySelector("#groupNameInput"),
      addGroupBtn: document.querySelector("#addGroupBtn"),
      addDefaultGroupsBtn: document.querySelector("#addDefaultGroupsBtn"),
      clearScheduleBtn: document.querySelector("#clearScheduleBtn"),
      scheduleList: document.querySelector("#scheduleList")
    };

    function readDuration(prefix) {
      const minutes = clampNumber(els[`${prefix}Minutes`].value, 0, 99);
      const seconds = clampNumber(els[`${prefix}Seconds`].value, 0, 59);
      return Math.max(1, minutes * 60 + seconds);
    }

    function readWarningTime() {
      const minutes = clampNumber(els.warningMinutes.value, 0, 99);
      const seconds = clampNumber(els.warningSeconds.value, 0, 59);
      return minutes * 60 + seconds;
    }

    function clampNumber(value, min, max) {
      const parsed = Number.parseInt(value, 10);
      if (Number.isNaN(parsed)) return min;
      return Math.min(max, Math.max(min, parsed));
    }

    function durationForPhase(phase) {
      return phase === "report" ? readDuration("report") : readDuration("qa");
    }

    function remainingSeconds() {
      return state.planned - state.elapsed;
    }

    function overtimeSeconds() {
      return Math.max(0, state.elapsed - state.planned);
    }

    function currentGroupName() {
      if (state.schedule.length > 0) {
        return state.schedule[state.currentGroupIndex]?.name || `第 ${state.currentGroupIndex + 1} 組`;
      }
      return `第 ${state.group} 組`;
    }

    function resetCurrentPhase() {
      stopTimer(false);
      state.planned = durationForPhase(state.phase);
      state.elapsed = 0;
      state.warned = false;
      state.doneRang = false;
      state.currentRecordId = null;
      state.startedAt = null;
      render();
    }

    function setPhase(phase, keepRunning = false) {
      finalizeCurrentRecord();
      state.phase = phase;
      state.planned = durationForPhase(phase);
      state.elapsed = 0;
      state.warned = false;
      state.doneRang = false;
      state.currentRecordId = null;
      state.startedAt = null;
      if (!keepRunning) stopTimer(false);
      if (keepRunning) beginRecordSession();
      render();
    }

    function startTimer() {
      if (state.running) return;
      ensureAudioContext();
      beginRecordSession();
      state.running = true;
      state.timerId = window.setInterval(tick, 1000);
      render();
    }

    function stopTimer(shouldRecord = true) {
      state.running = false;
      if (state.timerId) {
        window.clearInterval(state.timerId);
        state.timerId = null;
      }
      if (shouldRecord) finalizeCurrentRecord();
      render();
    }

    function tick() {
      state.elapsed += 1;
      const remaining = remainingSeconds();
      const warningTime = readWarningTime();

      if (!state.warned && warningTime > 0 && remaining === warningTime) {
        state.warned = true;
        ring("warning");
      }

      if (!state.doneRang && remaining === 0) {
        state.doneRang = true;
        ring("done");
        if (state.phase === "report" && els.autoAdvance.checked) {
          setPhase("qa", true);
          return;
        }
      }

      render();
    }

    function nextGroup() {
      finalizeCurrentRecord();
      stopTimer(false);
      if (state.schedule.length > 0) {
        state.currentGroupIndex += 1;
        state.group = state.currentGroupIndex + 1;
      } else {
        state.group += 1;
      }
      state.phase = "report";
      state.planned = durationForPhase("report");
      state.elapsed = 0;
      state.warned = false;
      state.doneRang = false;
      state.currentRecordId = null;
      state.startedAt = null;
      render();
    }

    function beginRecordSession() {
      if (!state.currentRecordId) {
        state.currentRecordId = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        state.startedAt = Date.now();
      }
    }

    function finalizeCurrentRecord() {
      if (state.elapsed <= 0) return;
      beginRecordSession();
      const duplicate = state.records.find((record) => record.id === state.currentRecordId);
      if (duplicate) {
        duplicate.groupName = currentGroupName();
        duplicate.planned = state.planned;
        duplicate.elapsed = state.elapsed;
        duplicate.overtime = overtimeSeconds();
      } else {
        state.records.push({
          id: state.currentRecordId,
          group: state.group,
          groupName: currentGroupName(),
          phase: state.phase,
          planned: state.planned,
          elapsed: state.elapsed,
          overtime: overtimeSeconds(),
          startedAt: state.startedAt
        });
      }
      saveRecords();
      renderHistory();
    }

    function formatTime(totalSeconds) {
      const absSeconds = Math.abs(totalSeconds);
      const minutes = Math.floor(absSeconds / 60);
      const seconds = absSeconds % 60;
      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function formatMainTime() {
      const remaining = remainingSeconds();
      if (remaining < 0) return `+${formatTime(Math.abs(remaining))}`;
      return formatTime(remaining);
    }

    function render() {
      const remaining = remainingSeconds();
      const warningTime = readWarningTime();
      const isWarning = remaining > 0 && warningTime > 0 && remaining <= warningTime;
      const isOvertime = remaining < 0;
      const ratio = state.planned > 0 ? Math.max(0, Math.min(1, remaining / state.planned)) : 0;

      els.groupTitle.textContent = currentGroupName();
      els.phasePill.textContent = phaseNames[state.phase];
      els.timeDisplay.textContent = formatMainTime();
      els.timeDisplay.classList.toggle("warning", isWarning && !isOvertime);
      els.timeDisplay.classList.toggle("overtime", isOvertime);
      els.plannedMetric.textContent = formatTime(state.planned);
      els.elapsedMetric.textContent = formatTime(state.elapsed);
      els.overtimeMetric.textContent = formatTime(overtimeSeconds());
      els.progressBar.style.width = `${ratio * 100}%`;
      els.progressBar.classList.toggle("warning", isWarning && !isOvertime);
      els.progressBar.classList.toggle("overtime", isOvertime);
      els.startPauseBtn.textContent = state.running ? "暫停/結束本段" : "開始";
      els.skipBtn.textContent = state.phase === "report" ? "切到 QA" : "回報告";

      if (isOvertime) {
        els.statusText.textContent = `${phaseNames[state.phase]}超時 ${formatTime(overtimeSeconds())}`;
      } else if (remaining === 0) {
        els.statusText.textContent = `${phaseNames[state.phase]}時間到，繼續計算超時`;
      } else if (state.running) {
        els.statusText.textContent = isWarning ? "剩最後半分鐘" : `${phaseNames[state.phase]}進行中`;
      } else {
        els.statusText.textContent = `準備開始${phaseNames[state.phase]}`;
      }
    }

    function renderHistory() {
      const totalOvertime = state.records.reduce((sum, record) => sum + record.overtime, 0);
      els.recordCount.textContent = String(state.records.length);
      els.totalOvertime.textContent = formatTime(totalOvertime);

      if (state.records.length === 0) {
        els.historyBody.innerHTML = '<tr><td class="empty" colspan="5">尚無紀錄</td></tr>';
        return;
      }

      els.historyBody.innerHTML = state.records.map((record) => `
        <tr>
          <td>${record.groupName || `第 ${record.group} 組`}</td>
          <td>${phaseNames[record.phase]}</td>
          <td>${formatTime(record.planned)}</td>
          <td>${formatTime(record.elapsed)}</td>
          <td class="${record.overtime > 0 ? "over" : ""}">${formatTime(record.overtime)}</td>
        </tr>
      `).join("");
    }

    function ensureAudioContext() {
      if (!state.audioContext) {
        state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (state.audioContext.state === "suspended") {
        state.audioContext.resume();
      }
      state.soundReady = true;
      els.soundStatus.textContent = "聲音已啟用";
    }

    function ring(kind) {
      ensureAudioContext();
      const ctx = state.audioContext;
      const volume = Number(els.volume.value) / 100;
      const now = ctx.currentTime;
      const theme = els.soundTheme.value;

      if (theme === "marimba") {
        playPattern(ctx, kind === "done" ? [523.25, 659.25, 783.99, 1046.5] : [659.25, 783.99], now, 0.22, 0.2, volume, "triangle");
        return;
      }

      if (theme === "bell") {
        playBellPattern(ctx, kind, now, volume);
        return;
      }

      playPattern(ctx, kind === "done" ? [659.25, 880, 987.77, 1318.51] : [880, 1174.66], now, 0.32, 0.28, volume, "sine");
    }

    function playPattern(ctx, notes, start, spacing, duration, volume, wave) {
      notes.forEach((frequency, index) => {
        playTone(ctx, frequency, start + index * spacing, duration, volume, wave);
        playTone(ctx, frequency * 2, start + index * spacing + 0.01, duration * 0.8, volume * 0.18, "sine");
      });
    }

    function playBellPattern(ctx, kind, start, volume) {
      const notes = kind === "done" ? [880, 880, 880, 1174.66] : [784, 1046.5];
      notes.forEach((frequency, index) => {
        const noteStart = start + index * 0.34;
        playTone(ctx, frequency, noteStart, 0.26, volume, "square");
        playTone(ctx, frequency * 1.5, noteStart + 0.015, 0.2, volume * 0.45, "triangle");
      });
    }

    function playTone(ctx, frequency, start, duration, volume, wave = "sine") {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      osc.type = wave;
      osc.frequency.setValueAtTime(frequency, start);
      filter.type = "lowpass";
      filter.frequency.setValueAtTime(wave === "square" ? 2200 : 3600, start);
      filter.Q.setValueAtTime(0.6, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, volume * 0.75), start + 0.018);
      gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, volume * 0.28), start + duration * 0.45);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);
      osc.start(start);
      osc.stop(start + duration + 0.04);
    }

    function applyPreset(reportSeconds, qaSeconds) {
      els.reportMinutes.value = Math.floor(reportSeconds / 60);
      els.reportSeconds.value = reportSeconds % 60;
      els.qaMinutes.value = Math.floor(qaSeconds / 60);
      els.qaSeconds.value = qaSeconds % 60;
      resetCurrentPhase();
    }

    function switchTab(tabName) {
      els.tabButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === tabName);
      });
      els.tabPanels.forEach((panel) => {
        panel.classList.toggle("active", panel.id === `${tabName}Panel`);
      });
    }

    function addGroup(name) {
      const trimmed = name.trim();
      if (!trimmed) return;
      state.schedule.push({
        id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        name: trimmed
      });
      if (state.schedule.length === 1) {
        state.currentGroupIndex = 0;
        state.group = 1;
      }
      els.groupNameInput.value = "";
      saveSchedule();
      renderSchedule();
      render();
    }

    function createDefaultGroups() {
      state.schedule = Array.from({ length: 8 }, (_, index) => ({
        id: `default-${Date.now()}-${index}`,
        name: `第 ${index + 1} 組`
      }));
      state.currentGroupIndex = 0;
      state.group = 1;
      saveSchedule();
      renderSchedule();
      render();
    }

    function setCurrentGroup(index) {
      finalizeCurrentRecord();
      stopTimer(false);
      state.currentGroupIndex = index;
      state.group = index + 1;
      state.phase = "report";
      state.planned = durationForPhase("report");
      state.elapsed = 0;
      state.warned = false;
      state.doneRang = false;
      state.currentRecordId = null;
      state.startedAt = null;
      saveSchedule();
      renderSchedule();
      render();
    }

    function moveGroup(index, direction) {
      const target = index + direction;
      if (target < 0 || target >= state.schedule.length) return;
      const [item] = state.schedule.splice(index, 1);
      state.schedule.splice(target, 0, item);
      if (state.currentGroupIndex === index) {
        state.currentGroupIndex = target;
      } else if (state.currentGroupIndex === target) {
        state.currentGroupIndex = index;
      }
      state.group = state.currentGroupIndex + 1;
      saveSchedule();
      renderSchedule();
      render();
    }

    function removeGroup(index) {
      state.schedule.splice(index, 1);
      if (state.schedule.length === 0) {
        state.currentGroupIndex = 0;
        state.group = 1;
      } else {
        state.currentGroupIndex = Math.min(state.currentGroupIndex, state.schedule.length - 1);
        state.group = state.currentGroupIndex + 1;
      }
      saveSchedule();
      renderSchedule();
      render();
    }

    function renderSchedule() {
      if (state.schedule.length === 0) {
        els.scheduleList.innerHTML = '<p class="hint">尚未設定組別順序。可以逐一新增，或按「建立 8 組」。</p>';
        return;
      }

      els.scheduleList.innerHTML = state.schedule.map((group, index) => `
        <div class="schedule-item ${index === state.currentGroupIndex ? "active" : ""}">
          <span class="schedule-number">${index + 1}</span>
          <span class="schedule-name" title="${escapeHtml(group.name)}">${escapeHtml(group.name)}</span>
          <button class="icon-button" type="button" data-action="up" data-index="${index}" title="往上">↑</button>
          <button class="icon-button" type="button" data-action="down" data-index="${index}" title="往下">↓</button>
          <button class="icon-button danger" type="button" data-action="remove" data-index="${index}" title="刪除">×</button>
          <button class="button small set-current" type="button" data-action="current" data-index="${index}">設為目前</button>
        </div>
      `).join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function saveSchedule() {
      localStorage.setItem("presentationTimerSchedule", JSON.stringify({
        currentGroupIndex: state.currentGroupIndex,
        schedule: state.schedule
      }));
    }

    function loadSchedule() {
      try {
        const saved = JSON.parse(localStorage.getItem("presentationTimerSchedule") || "{}");
        state.schedule = Array.isArray(saved.schedule) ? saved.schedule : [];
        state.currentGroupIndex = clampNumber(saved.currentGroupIndex, 0, Math.max(0, state.schedule.length));
        state.group = state.currentGroupIndex + 1;
      } catch {
        state.schedule = [];
        state.currentGroupIndex = 0;
        state.group = 1;
      }
    }

    function saveSoundSettings() {
      localStorage.setItem("presentationTimerSound", JSON.stringify({
        theme: els.soundTheme.value,
        volume: els.volume.value
      }));
    }

    function loadSoundSettings() {
      try {
        const saved = JSON.parse(localStorage.getItem("presentationTimerSound") || "{}");
        if (saved.theme) els.soundTheme.value = saved.theme;
        if (saved.volume) els.volume.value = saved.volume;
      } catch {
        els.soundTheme.value = "chime";
        els.volume.value = "100";
      }
    }

    function saveRecords() {
      localStorage.setItem("presentationTimerRecords", JSON.stringify(state.records));
    }

    function loadRecords() {
      try {
        state.records = JSON.parse(localStorage.getItem("presentationTimerRecords") || "[]");
      } catch {
        state.records = [];
      }
    }

    function downloadCsv() {
      const header = ["組別", "階段", "原定秒數", "實際秒數", "超時秒數", "原定", "實際", "超時"];
      const rows = state.records.map((record) => [
        record.groupName || `第 ${record.group} 組`,
        phaseNames[record.phase],
        record.planned,
        record.elapsed,
        record.overtime,
        formatTime(record.planned),
        formatTime(record.elapsed),
        formatTime(record.overtime)
      ]);
      const csv = [header, ...rows].map((row) => row.map(csvCell).join(",")).join("\n");
      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "presentation-timer-records.csv";
      link.click();
      URL.revokeObjectURL(url);
    }

    function csvCell(value) {
      return `"${String(value).replaceAll('"', '""')}"`;
    }

    els.startPauseBtn.addEventListener("click", () => {
      if (state.running) {
        stopTimer(true);
      } else {
        startTimer();
      }
    });

    els.resetBtn.addEventListener("click", resetCurrentPhase);
    els.skipBtn.addEventListener("click", () => setPhase(state.phase === "report" ? "qa" : "report"));
    els.nextGroupBtn.addEventListener("click", nextGroup);
    els.presetDefaultBtn.addEventListener("click", () => applyPreset(6 * 60, 7 * 60));
    els.presetShortBtn.addEventListener("click", () => applyPreset(40, 40));
    els.soundBtn.addEventListener("click", () => {
      ensureAudioContext();
      ring("done");
    });
    els.soundTheme.addEventListener("change", saveSoundSettings);
    els.volume.addEventListener("change", saveSoundSettings);
    els.volume.addEventListener("input", saveSoundSettings);
    els.downloadCsvBtn.addEventListener("click", downloadCsv);
    els.clearHistoryBtn.addEventListener("click", () => {
      state.records = [];
      saveRecords();
      renderHistory();
    });
    els.tabButtons.forEach((button) => {
      button.addEventListener("click", () => switchTab(button.dataset.tab));
    });
    els.addGroupBtn.addEventListener("click", () => addGroup(els.groupNameInput.value));
    els.groupNameInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") addGroup(els.groupNameInput.value);
    });
    els.addDefaultGroupsBtn.addEventListener("click", createDefaultGroups);
    els.clearScheduleBtn.addEventListener("click", () => {
      state.schedule = [];
      state.currentGroupIndex = 0;
      state.group = 1;
      saveSchedule();
      renderSchedule();
      render();
    });
    els.scheduleList.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const index = Number(button.dataset.index);
      if (button.dataset.action === "up") moveGroup(index, -1);
      if (button.dataset.action === "down") moveGroup(index, 1);
      if (button.dataset.action === "remove") removeGroup(index);
      if (button.dataset.action === "current") setCurrentGroup(index);
    });

    [
      els.reportMinutes,
      els.reportSeconds,
      els.qaMinutes,
      els.qaSeconds,
      els.warningMinutes,
      els.warningSeconds
    ].forEach((input) => {
      input.addEventListener("change", () => {
        input.value = clampNumber(input.value, Number(input.min), Number(input.max));
        if (!state.running) resetCurrentPhase();
        render();
      });
    });

    loadSoundSettings();
    loadSchedule();
    loadRecords();
    resetCurrentPhase();
    renderSchedule();
    renderHistory();
  </script>
</body>
</html>
