<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">歷史紀錄與 CSV 匯出</title>
  <desc id="desc">歷史紀錄分頁顯示已記錄段落、累計超時與每組實際用時。</desc>
  <rect width="900" height="620" fill="#f4f7f8"/>
  <rect x="36" y="28" width="828" height="564" rx="8" fill="#fff" stroke="#d8e0e6" stroke-width="2"/>
  <rect x="64" y="56" width="220" height="58" rx="8" fill="#fff" stroke="#d8e0e6" stroke-width="2"/>
  <rect x="340" y="56" width="220" height="58" rx="8" fill="#fff" stroke="#d8e0e6" stroke-width="2"/>
  <rect x="616" y="56" width="220" height="58" rx="8" fill="#0f7b6c"/>
  <text x="174" y="94" text-anchor="middle" font-family="Microsoft JhengHei, sans-serif" font-size="28" fill="#5f6f7d" font-weight="900">設定</text>
  <text x="450" y="94" text-anchor="middle" font-family="Microsoft JhengHei, sans-serif" font-size="28" fill="#5f6f7d" font-weight="900">組別順序</text>
  <text x="726" y="94" text-anchor="middle" font-family="Microsoft JhengHei, sans-serif" font-size="28" fill="#fff" font-weight="900">歷史紀錄</text>
  <line x1="36" y1="136" x2="864" y2="136" stroke="#d8e0e6" stroke-width="2"/>
  <text x="80" y="190" font-family="Microsoft JhengHei, sans-serif" font-size="28" fill="#17202a" font-weight="900">後臺紀錄</text>
  <rect x="80" y="222" width="350" height="78" rx="8" fill="#f4f7f8"/>
  <rect x="450" y="222" width="370" height="78" rx="8" fill="#f4f7f8"/>
  <text x="104" y="252" font-family="Microsoft JhengHei, sans-serif" font-size="16" fill="#5f6f7d" font-weight="900">已記錄段落</text>
  <text x="474" y="252" font-family="Microsoft JhengHei, sans-serif" font-size="16" fill="#5f6f7d" font-weight="900">累計超時</text>
  <text x="104" y="282" font-family="Arial, sans-serif" font-size="28" fill="#17202a" font-weight="900">4</text>
  <text x="474" y="282" font-family="Arial, sans-serif" font-size="28" fill="#b72534" font-weight="900">02:15</text>
  <rect x="80" y="330" width="740" height="168" rx="8" fill="#fff" stroke="#d8e0e6" stroke-width="2"/>
  <rect x="80" y="330" width="740" height="42" rx="8" fill="#f4f7f8"/>
  <text x="104" y="358" font-family="Microsoft JhengHei, sans-serif" font-size="16" fill="#5f6f7d" font-weight="900">組別</text>
  <text x="246" y="358" font-family="Microsoft JhengHei, sans-serif" font-size="16" fill="#5f6f7d" font-weight="900">階段</text>
  <text x="370" y="358" font-family="Microsoft JhengHei, sans-serif" font-size="16" fill="#5f6f7d" font-weight="900">原定</text>
  <text x="500" y="358" font-family="Microsoft JhengHei, sans-serif" font-size="16" fill="#5f6f7d" font-weight="900">實際</text>
  <text x="636" y="358" font-family="Microsoft JhengHei, sans-serif" font-size="16" fill="#5f6f7d" font-weight="900">超時</text>
  <line x1="80" y1="414" x2="820" y2="414" stroke="#d8e0e6"/>
  <line x1="80" y1="456" x2="820" y2="456" stroke="#d8e0e6"/>
  <text x="104" y="400" font-family="Microsoft JhengHei, sans-serif" font-size="16" fill="#17202a">第 1 組</text>
  <text x="246" y="400" font-family="Microsoft JhengHei, sans-serif" font-size="16" fill="#17202a">報告</text>
  <text x="370" y="400" font-family="Arial, sans-serif" font-size="16" fill="#17202a">06:00</text>
  <text x="500" y="400" font-family="Arial, sans-serif" font-size="16" fill="#17202a">06:42</text>
  <text x="636" y="400" font-family="Arial, sans-serif" font-size="16" fill="#b72534" font-weight="900">00:42</text>
  <text x="104" y="442" font-family="Microsoft JhengHei, sans-serif" font-size="16" fill="#17202a">第 1 組</text>
  <text x="246" y="442" font-family="Microsoft JhengHei, sans-serif" font-size="16" fill="#17202a">QA</text>
  <text x="370" y="442" font-family="Arial, sans-serif" font-size="16" fill="#17202a">07:00</text>
  <text x="500" y="442" font-family="Arial, sans-serif" font-size="16" fill="#17202a">07:33</text>
  <text x="636" y="442" font-family="Arial, sans-serif" font-size="16" fill="#b72534" font-weight="900">00:33</text>
  <rect x="80" y="530" width="350" height="48" rx="8" fill="#e8eef1"/>
  <rect x="450" y="530" width="370" height="48" rx="8" fill="#f4e4e6" stroke="#e8c4c8"/>
  <text x="255" y="562" text-anchor="middle" font-family="Microsoft JhengHei, sans-serif" font-size="20" fill="#17202a" font-weight="900">下載 CSV</text>
  <text x="635" y="562" text-anchor="middle" font-family="Microsoft JhengHei, sans-serif" font-size="20" fill="#b72534" font-weight="900">清除紀錄</text>
  <path d="M604 496 C562 520, 470 532, 430 542" fill="none" stroke="#b86416" stroke-width="5" stroke-linecap="round"/>
  <text x="82" y="514" font-family="Microsoft JhengHei, sans-serif" font-size="18" fill="#b86416" font-weight="900">可把整堂課的時間紀錄匯出成 CSV</text>
</svg>
