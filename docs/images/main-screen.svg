  <text x="1015" y="70" text-anchor="middle" font-family="Microsoft JhengHei, sans-serif" font-size="16" fill="#5f6f7d" font-weight="900">組別順序</text>
  <text x="1105" y="70" text-anchor="middle" font-family="Microsoft JhengHei, sans-serif" font-size="16" fill="#5f6f7d" font-weight="900">歷史紀錄</text>
  <text x="884" y="126" font-family="Microsoft JhengHei, sans-serif" font-size="20" fill="#17202a" font-weight="900">時間設定</text>
  <rect x="884" y="158" width="128" height="46" rx="8" fill="#fff" stroke="#d8e0e6"/>
  <rect x="1024" y="158" width="128" height="46" rx="8" fill="#fff" stroke="#d8e0e6"/>
  <text x="902" y="187" font-family="Arial, sans-serif" font-size="24" fill="#17202a">6</text>
  <text x="1042" y="187" font-family="Arial, sans-serif" font-size="24" fill="#17202a">0</text>
  <text x="884" y="244" font-family="Microsoft JhengHei, sans-serif" font-size="20" fill="#17202a" font-weight="900">提醒與鈴聲</text>
  <rect x="884" y="282" width="268" height="56" rx="8" fill="#eef3f4"/>
  <text x="902" y="316" font-family="Microsoft JhengHei, sans-serif" font-size="15" fill="#0f7b6c" font-weight="900">啟用/測試鈴聲</text>
  <path d="M750 520 C835 502, 862 436, 884 338" fill="none" stroke="#b86416" stroke-width="5" stroke-linecap="round"/>
  <circle cx="884" cy="338" r="7" fill="#b86416"/>
  <text x="662" y="552" font-family="Microsoft JhengHei, sans-serif" font-size="18" fill="#b86416" font-weight="900">右側分頁管理設定與後台資料</text>
</svg>
